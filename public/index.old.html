<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intake Tech - AI Legal Intake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .container { max-width: 600px; margin: 40px auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
    .header h1 { font-size: 28px; margin-bottom: 5px; }
    .header p { opacity: 0.9; }
    .chat-box { height: 400px; overflow-y: auto; padding: 20px; background: #fafafa; border-bottom: 1px solid #eee; }
    .message { margin-bottom: 15px; }
    .message.bot { text-align: left; }
    .message.user { text-align: right; }
    .message-text { display: inline-block; max-width: 80%; padding: 12px 16px; border-radius: 8px; }
    .message.bot .message-text { background: white; border: 1px solid #ddd; color: #333; }
    .message.user .message-text { background: #667eea; color: white; }
    .input-area { padding: 20px; }
    .input-group { display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    button { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    button:hover { background: #5568d3; }
    .score-box { background: #f0f4ff; padding: 15px; margin-top: 10px; border-radius: 4px; border-left: 4px solid #667eea; }
    .score-box h3 { color: #667eea; margin-bottom: 8px; }
    .score-value { font-size: 24px; font-weight: bold; color: #667eea; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚖️ Intake Tech</h1>
      <p>24/7 AI-Powered Legal Intake for Personal Injury</p>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <div class="input-group">
        <input type="text" id="userInput" placeholder="Tell me about your case..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let conversationHistory = [];
    let caseData = {};

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;

      // Add user message to chat
      addMessage(message, 'user');
      input.value = '';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            conversationHistory,
          }),
        });

        const data = await response.json();
        conversationHistory.push({ role: 'user', content: message });
        conversationHistory.push({ role: 'assistant', content: data.reply });

        addMessage(data.reply, 'bot');

        // Extract data from user message
        extractCaseData(message);

        // After 5+ messages, show score
        if (conversationHistory.length >= 10) {
          scoreCase();
        }
      } catch (error) {
        addMessage('Error: ' + error.message, 'bot');
      }
    }

    function extractCaseData(message) {
      const lower = message.toLowerCase();
      
      // State detection
      const states = ['california', 'texas', 'florida', 'new york', 'pennsylvania'];
      states.forEach(state => {
        if (lower.includes(state)) caseData.state = state.substring(0, 2).toUpperCase();
      });

      // Insurance
      if (lower.includes('insurance') && lower.includes('yes')) caseData.hasInsurance = true;
      if (lower.includes('no insurance')) caseData.hasInsurance = false;

      // Police report
      if (lower.includes('police report') && lower.includes('yes')) caseData.hasPoliceReport = true;

      // Injury severity
      if (lower.includes('fracture') || lower.includes('broken')) caseData.injurySeverity = 'fracture';
      if (lower.includes('soft tissue')) caseData.injurySeverity = 'soft tissue';
      if (lower.includes('hospitalized')) caseData.injurySeverity = 'hospitalization';
    }

    async function scoreCase() {
      try {
        const response = await fetch('/api/score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ caseData }),
        });

        const data = await response.json();
        const scoreHtml = `
          <div class="score-box">
            <h3>Case Score: <span class="score-value">${data.score}/100</span></h3>
            <p>Decision: <strong>${data.decision}</strong></p>
            <p>Est. Value: $${data.caseValue.toLocaleString()}</p>
          </div>
        `;
        document.getElementById('chatBox').innerHTML += scoreHtml;
      } catch (error) {
        console.error('Scoring error:', error);
      }
    }

    function addMessage(text, sender) {
      const chatBox = document.getElementById('chatBox');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      messageDiv.innerHTML = `<div class="message-text">${text}</div>`;
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Initial greeting
    window.addEventListener('load', () => {
      addMessage('Hello! I\'m here to help qualify your personal injury case. Can you tell me a bit about what happened?', 'bot');
    });

    // Allow Enter key
    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
