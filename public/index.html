<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Case Intake - Intake Tech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Case Intake Form</h1>
      <p>Quick evaluation of your legal matter</p>
      <p class="tagline">Powered by Intake Tech</p>
    </div>

    <div class="form-container" id="form-container">
      <div id="error-message" class="error-message"></div>
      <div id="success-message" class="success-message"></div>

      <div class="step-indicator">
        <div class="step" data-step="1">1</div>
        <div class="step" data-step="2">2</div>
        <div class="step" data-step="3">3</div>
        <div class="step" data-step="4">4</div>
      </div>

      <!-- Step 1: Contact Information -->
      <div id="step1" class="form-section" style="display: none;">
        <h2>Your Contact Information</h2>
        
        <div class="form-group">
          <label for="firstName">First Name <span class="required">*</span></label>
          <input type="text" id="firstName" name="firstName" required>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name <span class="required">*</span></label>
          <input type="text" id="lastName" name="lastName" required>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="button-group">
          <button class="btn-primary" onclick="nextStep()">Next →</button>
        </div>
      </div>

      <!-- Step 2: Case Type -->
      <div id="step2" class="form-section" style="display: none;">
        <h2>What type of case is this?</h2>
        
        <div class="form-group">
          <label>Case Type <span class="required">*</span></label>
          <div class="radio-group">
            <div class="radio-item">
              <input type="radio" id="personal-injury" name="caseType" value="personal-injury" required>
              <label for="personal-injury">Personal Injury</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="employment" name="caseType" value="employment">
              <label for="employment">Employment</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="contract" name="caseType" value="contract">
              <label for="contract">Contract</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="other" name="caseType" value="other">
              <label for="other">Other</label>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-secondary" onclick="previousStep()">← Back</button>
          <button class="btn-primary" onclick="nextStep()">Next →</button>
        </div>
      </div>

      <!-- Step 3: Case Details -->
      <div id="step3" class="form-section" style="display: none;">
        <h2>Tell us about your case</h2>
        
        <div class="form-group">
          <label for="caseDescription">Case Description <span class="required">*</span></label>
          <textarea id="caseDescription" name="caseDescription" placeholder="Provide details about your legal matter..." required></textarea>
          <div class="helper-text">Include relevant dates, parties involved, and key facts</div>
        </div>

        <div class="form-group">
          <label for="dateOfIncident">Date of Incident <span class="required">*</span></label>
          <input type="date" id="dateOfIncident" name="dateOfIncident" required>
        </div>

        <div class="form-group">
          <label>Have you hired an attorney? <span class="required">*</span></label>
          <div class="radio-group">
            <div class="radio-item">
              <input type="radio" id="attorney-yes" name="hasAttorney" value="yes" required>
              <label for="attorney-yes">Yes</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="attorney-no" name="hasAttorney" value="no">
              <label for="attorney-no">No</label>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-secondary" onclick="previousStep()">← Back</button>
          <button class="btn-primary" onclick="nextStep()">Next →</button>
        </div>
      </div>

      <!-- Step 4: Review & Submit -->
      <div id="step4" class="form-section" style="display: none;">
        <h2>Review & Submit</h2>
        
        <div class="form-group">
          <label>
            <input type="checkbox" id="agree" name="agree" required>
            I agree to have my information reviewed and contacted by a representative
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="privacy" name="privacy" required>
            I agree to the privacy policy
          </label>
        </div>

        <div class="button-group">
          <button class="btn-secondary" onclick="previousStep()">← Back</button>
          <button class="btn-primary" onclick="submitForm()">Submit Case →</button>
        </div>
      </div>
    </div>

    <div id="score-result" class="score-result"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
