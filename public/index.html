<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Case Intake - Intake Tech</title>
  <style>/* Intake Tech - Professional Legal Intake Form */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 700px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  overflow: hidden;
}

.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 40px 30px;
  text-align: center;
}

.header h1 {
  font-size: 32px;
  margin-bottom: 10px;
  font-weight: 700;
}

.header p {
  font-size: 16px;
  opacity: 0.95;
  margin-bottom: 5px;
}

.header .tagline {
  font-size: 14px;
  opacity: 0.8;
}

.form-container {
  padding: 40px;
}

.form-section {
  margin-bottom: 30px;
}

.form-section h2 {
  font-size: 18px;
  color: #333;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid #f0f0f0;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  font-weight: 600;
  color: #333;
  margin-bottom: 8px;
  font-size: 14px;
}

input[type="text"],
input[type="email"],
input[type="tel"],
input[type="date"],
select,
textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.3s, box-shadow 0.3s;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus,
input[type="date"]:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.radio-group,
.checkbox-group {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.radio-item,
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

input[type="radio"],
input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: #667eea;
}

.radio-item label,
.checkbox-item label {
  margin: 0;
  font-weight: 500;
  cursor: pointer;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

@media (max-width: 600px) {
  .form-row {
    grid-template-columns: 1fr;
  }
}

.button-group {
  display: flex;
  gap: 10px;
  margin-top: 30px;
}

button {
  flex: 1;
  padding: 14px 20px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-primary {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: #f0f0f0;
  color: #333;
}

.btn-secondary:hover {
  background: #e0e0e0;
}

.success-message {
  display: none;
  background: #d4edda;
  color: #155724;
  padding: 20px;
  border-radius: 6px;
  margin-bottom: 20px;
  border-left: 4px solid #28a745;
}

.error-message {
  display: none;
  background: #f8d7da;
  color: #721c24;
  padding: 20px;
  border-radius: 6px;
  margin-bottom: 20px;
  border-left: 4px solid #f5c6cb;
}

.score-result {
  display: none;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
  padding: 30px;
  border-radius: 8px;
  margin-top: 20px;
  text-align: center;
}

.score-result h3 {
  font-size: 18px;
  margin-bottom: 10px;
}

.score-value {
  font-size: 48px;
  font-weight: 700;
  margin: 15px 0;
}

.score-result p {
  font-size: 16px;
  margin: 8px 0;
}

.required {
  color: #f5576c;
}

.helper-text {
  font-size: 12px;
  color: #999;
  margin-top: 4px;
}

.step-indicator {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  justify-content: center;
}

.step {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: #999;
  transition: all 0.3s;
}

.step.active {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

.step.completed {
  background: #28a745;
  color: white;
}
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Case Intake Form</h1>
      <p>Quick evaluation of your legal matter</p>
      <p class="tagline">Powered by Intake Tech</p>
    </div>

    <div class="form-container" id="form-container">
      <div id="error-message" class="error-message"></div>
      <div id="success-message" class="success-message"></div>

      <div class="step-indicator">
        <div class="step" data-step="1">1</div>
        <div class="step" data-step="2">2</div>
        <div class="step" data-step="3">3</div>
        <div class="step" data-step="4">4</div>
      </div>

      <!-- Step 1: Contact Information -->
      <div id="step1" class="form-section" style="display: none;">
        <h2>Your Contact Information</h2>
        
        <div class="form-group">
          <label for="firstName">First Name <span class="required">*</span></label>
          <input type="text" id="firstName" name="firstName" required>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name <span class="required">*</span></label>
          <input type="text" id="lastName" name="lastName" required>
        </div>

        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="button-group">
          <button class="btn-primary" onclick="nextStep()">Next →</button>
        </div>
      </div>

      <!-- Step 2: Case Type -->
      <div id="step2" class="form-section" style="display: none;">
        <h2>What type of case is this?</h2>
        
        <div class="form-group">
          <label>Case Type <span class="required">*</span></label>
          <div class="radio-group">
            <div class="radio-item">
              <input type="radio" id="personal-injury" name="caseType" value="personal-injury" required>
              <label for="personal-injury">Personal Injury</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="employment" name="caseType" value="employment">
              <label for="employment">Employment</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="contract" name="caseType" value="contract">
              <label for="contract">Contract</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="other" name="caseType" value="other">
              <label for="other">Other</label>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-secondary" onclick="previousStep()">← Back</button>
          <button class="btn-primary" onclick="nextStep()">Next →</button>
        </div>
      </div>

      <!-- Step 3: Case Details -->
      <div id="step3" class="form-section" style="display: none;">
        <h2>Tell us about your case</h2>
        
        <div class="form-group">
          <label for="caseDescription">Case Description <span class="required">*</span></label>
          <textarea id="caseDescription" name="caseDescription" placeholder="Provide details about your legal matter..." required></textarea>
          <div class="helper-text">Include relevant dates, parties involved, and key facts</div>
        </div>

        <div class="form-group">
          <label for="dateOfIncident">Date of Incident <span class="required">*</span></label>
          <input type="date" id="dateOfIncident" name="dateOfIncident" required>
        </div>

        <div class="form-group">
          <label>Have you hired an attorney? <span class="required">*</span></label>
          <div class="radio-group">
            <div class="radio-item">
              <input type="radio" id="attorney-yes" name="hasAttorney" value="yes" required>
              <label for="attorney-yes">Yes</label>
            </div>
            <div class="radio-item">
              <input type="radio" id="attorney-no" name="hasAttorney" value="no">
              <label for="attorney-no">No</label>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-secondary" onclick="previousStep()">← Back</button>
          <button class="btn-primary" onclick="nextStep()">Next →</button>
        </div>
      </div>

      <!-- Step 4: Review & Submit -->
      <div id="step4" class="form-section" style="display: none;">
        <h2>Review & Submit</h2>
        
        <div class="form-group">
          <label>
            <input type="checkbox" id="agree" name="agree" required>
            I agree to have my information reviewed and contacted by a representative
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="privacy" name="privacy" required>
            I agree to the privacy policy
          </label>
        </div>

        <div class="button-group">
          <button class="btn-secondary" onclick="previousStep()">← Back</button>
          <button class="btn-primary" onclick="submitForm()">Submit Case →</button>
        </div>
      </div>
    </div>

    <div id="score-result" class="score-result"></div>
  </div>

  <script>// Intake Tech - Main Application Logic
let currentStep = 1;
const totalSteps = 4;
let formData = {};

function initForm() {
  document.getElementById('step1').style.display = 'block';
  updateStepIndicator();
}

function updateStepIndicator() {
  for (let i = 1; i <= totalSteps; i++) {
    const step = document.querySelector(`[data-step="${i}"]`);
    if (i < currentStep) {
      step.classList.add('completed');
      step.classList.remove('active');
    } else if (i === currentStep) {
      step.classList.add('active');
      step.classList.remove('completed');
    } else {
      step.classList.remove('active', 'completed');
    }
  }
}

function showStep(step) {
  for (let i = 1; i <= totalSteps; i++) {
    const section = document.getElementById(`step${i}`);
    if (section) {
      section.style.display = i === step ? 'block' : 'none';
    }
  }
  currentStep = step;
  updateStepIndicator();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextStep() {
  if (validateStep(currentStep)) {
    saveStepData(currentStep);
    if (currentStep < totalSteps) {
      showStep(currentStep + 1);
    }
  }
}

function previousStep() {
  if (currentStep > 1) {
    showStep(currentStep - 1);
  }
}

function validateStep(step) {
  const required = document.querySelectorAll(`#step${step} input[required], #step${step} select[required], #step${step} textarea[required]`);
  let isValid = true;
  
  required.forEach(field => {
    if (!field.value.trim()) {
      field.style.borderColor = '#f5576c';
      isValid = false;
    } else {
      field.style.borderColor = '#ddd';
    }
  });
  
  if (!isValid) {
    showError('Please fill in all required fields');
  }
  
  return isValid;
}

function saveStepData(step) {
  const fields = document.querySelectorAll(`#step${step} input, #step${step} select, #step${step} textarea`);
  fields.forEach(field => {
    if (field.type === 'radio' || field.type === 'checkbox') {
      if (field.checked) {
        formData[field.name] = field.value;
      }
    } else {
      formData[field.name] = field.value;
    }
  });
}

function showError(message) {
  const errorDiv = document.getElementById('error-message');
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
  setTimeout(() => {
    errorDiv.style.display = 'none';
  }, 5000);
}

function showSuccess(message) {
  const successDiv = document.getElementById('success-message');
  successDiv.textContent = message;
  successDiv.style.display = 'block';
}

async function submitForm() {
  if (!validateStep(currentStep)) {
    return;
  }
  
  saveStepData(currentStep);
  
  try {
    const response = await fetch('/api/intake', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });
    
    if (!response.ok) throw new Error('Submission failed');
    
    const result = await response.json();
    displayScore(result);
  } catch (error) {
    showError('Failed to submit form: ' + error.message);
  }
}

function displayScore(result) {
  const scoreDiv = document.getElementById('score-result');
  scoreDiv.innerHTML = `
    <h3>Case Evaluation Complete</h3>
    <div class="score-value">${result.score}/100</div>
    <p><strong>Decision: ${result.decision}</strong></p>
    <p>Estimated Case Value: ${result.caseValue.toLocaleString()}</p>
    <p style="margin-top: 15px; font-size: 14px;">A representative will contact you within 24 hours.</p>
  `;
  scoreDiv.style.display = 'block';
  document.getElementById('form-container').style.display = 'none';
}

window.addEventListener('DOMContentLoaded', initForm);
</script>
</body>
</html>
